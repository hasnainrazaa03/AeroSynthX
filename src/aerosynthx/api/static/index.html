<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AeroSynthX</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>AeroSynthX</h1>
      <div>
        <label for="api-key" style="margin-right: 0.5em;">API Key:</label>
        <input type="text" id="api-key" placeholder="Enter key (optional)" style="margin-right: 1em;" />
        <span id="version" class="badge">…</span>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Design intent</h2>
        <form id="intent-form">
          <textarea
            id="intent-text"
            rows="3"
            placeholder="e.g. NACA 2412 at 50 m/s, alpha 3 deg, chord 1.0 m."
          ></textarea>
          <div class="row">
            <div>
              <label for="analysis-mode">Mode:</label>
              <select id="analysis-mode" style="margin-right: 1em;">
                <option value="openfoam" selected>OpenFOAM (High-Fidelity)</option>
                <option value="xfoil">XFOIL (Fast Analysis)</option>
              </select>
              <label>
                <input type="checkbox" id="resume" checked />
                resume
              </label>
            </div>
            <button type="submit" id="run-btn">
              <span id="run-spinner" class="loader" hidden style="vertical-align: middle; margin-right: 5px; width: 12px; height: 12px; border-width: 2px;"></span>
              Run pipeline
            </button>
          </div>
        </form>
      </section>

      <section class="panel" id="result-panel" hidden>
        <h2>Result</h2>
        <div id="result-summary"></div>
        <h3>Stages</h3>
        <table id="stages">
          <thead>
            <tr><th data-sort="name">Name</th><th data-sort="status">Status</th><th data-sort="ms">ms</th><th>Digest</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="result-details">
          <h3>Case files</h3>
          <ul id="files"></ul>
          <h3>XFOIL Results</h3>
          <table id="xfoil-results" hidden>
            <thead>
              <tr><th data-sort="alpha">Alpha (deg)</th><th data-sort="cl">Cl</th><th data-sort="cd">Cd</th><th data-sort="cm">Cm</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel" style="grid-column: 1 / -1;">
        <h2>Run history <span id="history-spinner" class="loader" hidden style="margin-left: 10px; width: 16px; height: 16px; border-width: 3px;"></span></h2>
        <div class="runs-controls">
          <input id="runs-search" type="search" placeholder="Search intent text (live)…" style="flex-grow: 1;" />
          <select id="runs-status">
            <option value="">All statuses</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
        </div>
        <table id="runs">
          <thead>
            <tr><th>Run ID</th><th>Status</th><th>Created</th><th>Intent</th><th>Report</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div class="runs-pager">
          <button id="runs-prev" type="button" disabled>Prev</button>
          <span id="runs-page-info"></span>
          <button id="runs-next" type="button" disabled>Next</button>
        </div>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
